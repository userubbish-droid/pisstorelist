{% extends "base.html" %}
{% block content %}
  <div>
    <h2 class="text-lg font-semibold">低库存检查结果</h2>
    <p class="text-sm text-slate-600 mt-1">本次实际发送 Telegram：<span class="font-semibold">{{ sent }}</span> 条</p>
  </div>

  <div class="mt-6 bg-white border rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50 text-slate-700">
        <tr>
          <th class="text-left p-3">物品</th>
          <th class="text-left p-3">库存</th>
          <th class="text-left p-3">阈值</th>
          <th class="text-left p-3">单位</th>
        </tr>
      </thead>
      <tbody>
        {% for it in items %}
          <tr class="border-t bg-amber-50">
            <td class="p-3 font-medium">
              <a class="hover:underline" href="/items/{{ it['id'] }}">{{ it["name"] }}</a>
            </td>
            <td class="p-3 text-amber-700 font-semibold">{{ it["stock"] }}</td>
            <td class="p-3">{{ it["threshold"] }}</td>
            <td class="p-3">{{ it["unit"] }}</td>
          </tr>
        {% endfor %}
        {% if not items %}
          <tr class="border-t">
            <td class="p-6 text-center text-slate-500" colspan="4">当前没有低库存物品。</td>
          </tr>
        {% endif %}
      </tbody>
    </table>
  </div>

  <div class="mt-6">
    <a class="text-sm text-slate-700 hover:underline" href="/items">← 返回物品列表</a>
  </div>
{% endblock %}
