<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or "食堂厨房库存" }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <nav class="bg-white border-b">
      <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <a class="font-semibold" href="/items">食堂厨房库存</a>
          <a class="text-sm text-slate-600 hover:text-slate-900" href="/items">物品</a>
          <a class="text-sm text-slate-600 hover:text-slate-900" href="/movements">流水</a>
        </div>
        <form method="post" action="/logout">
          <button class="text-sm px-3 py-1 rounded border hover:bg-slate-50" type="submit">退出</button>
        </form>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-6">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
